name: CI Pipeline

"on":
  push:
    branches:
      - main
      - master
      - dev
      - saved-places
      - feature/**
  pull_request:
    branches:
      - main
      - master
      - dev

jobs:
  frontend:
    name: Frontend Build and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests
        run: npm test || echo "No tests"

  backend:
    name: Backend Build and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build backend
        run: npm run build

      - name: Run backend tests
        run: npm test || echo "No tests"